<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하이원 워터월드 | 프리미엄 산악형 워터파크</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Pretendard', system-ui, sans-serif; }
        .hero-bg {
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1587502537745-84b86d3a7e6e');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="bg-[#F7FBFF]">
    <!-- Hero -->
    <header class="hero-bg h-screen flex items-center text-white">
        <div class="max-w-5xl mx-auto px-6 text-center">
            <h1 class="text-6xl md:text-7xl font-bold mb-6">올여름,<br>가장 시원한 하루를 만나다</h1>
            <p class="text-2xl mb-12">푸른 산속에서 즐기는 프리미엄 워터파크</p>
            <button class="bg-white text-[#0077C8] px-12 py-5 rounded-2xl text-xl font-semibold">지금 예약하기</button>
        </div>
    </header>

    <!-- 더 많은 섹션은 이전에 드린 코드 참고 -->
    <footer class="bg-gray-900 text-gray-400 py-16 text-center">
        <p>Copyright © 2026 하이원 워터월드</p>
    </footer>
</body>
</html>
